<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Video Background</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <style>
        /* styles.css */

/* styles.css */

body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* Navbar Styling */
header {
    position: absolute;
    top: 0;
    width: 100%;
    z-index: 3;
    background: rgba(0, 0, 0, 0.5); /* Semi-transparent background */
    color: white;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 2rem;
}

.navbar .logo {
    font-size: 1.5rem;
    font-weight: bold;
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 1.5rem;
}

.nav-links a {
    color: white;
    text-decoration: none;
    font-size: 1rem;
    transition: color 0.3s ease;
}

.nav-links a:hover {
    color: #f7a800; /* Accent color */
}

/* Mobile Menu Toggle */
.menu-toggle {
    display: none;
    flex-direction: column;
    cursor: pointer;
    gap: 0.3rem;
}

.menu-toggle .bar {
    width: 25px;
    height: 3px;
    background: white;
}
/* Video Background */
.video-container {
    position: fixed; /* Ensures it stays in place even when scrolling */
    top: 0;
    left: 0;
    width: 100vw; /* Full viewport width */
    height: 100vh; /* Full viewport height */
    overflow: hidden;
    z-index: -1; /* Sends the video behind other elements */
}

video {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    min-width: 100%; /* Ensures the video covers the width */
    min-height: 100%; /* Ensures the video covers the height */
    object-fit: cover; /* Crops while keeping the aspect ratio */
}

.content {
    position: relative;
    z-index: 2;
    text-align: center;
    color: white;
    padding: 0 1rem;
}

.content h1 {
    font-size: 3rem;
    margin: 0;
}

.content p {
    font-size: 1.5rem;
}

/* Responsive Design */
@media (max-width: 768px) {
    .nav-links {
        display: none;
        flex-direction: column;
        background: rgba(0, 0, 0, 0.8);
        position: absolute;
        top: 100%;
        right: 0;
        width: 100%;
        text-align: center;
    }

    .nav-links.active {
        display: flex;
    }

    .menu-toggle {
        display: flex;
    }

    .content h1 {
        font-size: 2.5rem;
    }

    .content p {
        font-size: 1.2rem;
    }
}


    </style>
    <header>
        <nav class="navbar">
            <div class="logo">Valkorabuilk</div>
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <div class="video-container">
        <video autoplay loop muted playsinline>
            <source src="/a334d0085c8f1957a69280c8ce84bb47.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="content">
            <!-- <h1>Welcome to Valkorabuilk</h1>
            <p>Your trusted construction partner.</p>
        </div> -->
    </div>
    <script>
        // script.js

const mobileMenu = document.getElementById('mobile-menu');
const navLinks = document.querySelector('.nav-links');

mobileMenu.addEventListener('click', () => {
    navLinks.classList.toggle('active');
});

    </script>
</body>
</html>
