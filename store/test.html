  <style>
    /* Video Background Container */
    .video-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -1; /* Ensures video stays behind all content */
    }

    video {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 100%;
      min-height: 100%;
      object-fit: cover; /* Ensures the video covers the viewport */
      z-index: -1;
    }

    /* Content overlay for readability */
    .hero-content {
      position: relative;
      z-index: 1; /* Ensures content stays above the video */
      color: white;
    }
  </style>
</head>

<body>
  <!-- Video Background -->
  <div class="video-container">
